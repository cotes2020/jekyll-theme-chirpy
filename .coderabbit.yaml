# CodeRabbit 설정 - mascari4615.github.io
# 코드 리뷰 룰의 정본은 CLAUDE.md (레포 루트 + 디렉토리별 sub-CLAUDE.md) — CodeRabbit 이 자동 픽업.
# 본 yaml 은 CodeRabbit 자체에 대한 메타 설정만 (path_filters, profile 등).
# https://docs.coderabbit.ai/knowledge-base/code-guidelines

language: "ko-KR"

reviews:
  # PR 요약 자동 생성
  auto_review:
    enabled: true
    # draft PR은 리뷰 건너뜀
    drafts: false

  # 리뷰에서 집중할 영역
  path_filters:
    - "!_site/**"           # 빌드 결과물 제외
    - "!_site_test/**"
    - "!node_modules/**"
    - "!assets/js/dist/**"  # 컴파일된 JS 제외 (소스는 _javascript/ 에 있음)
    - "!Gemfile.lock"
    - "!package-lock.json"
    - "!.jekyll-cache/**"
    - "!.jekyll-metadata"

chat:
  # PR 내에서 @coderabbitai 멘션으로 대화 가능
  auto_reply: true
