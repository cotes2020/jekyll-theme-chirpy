name: AI Quality Gate

on:
  push:
    paths:
      - "apps/karmolab/src/gemini.ts"
      - "apps/karmolab/src/widgets/chatbot/**"
      - "apps/karmolab/src/ai/**"
      - "packages/karmolab-ai/**"
      - ".github/workflows/ai-quality.yml"
  pull_request:
    paths:
      - "apps/karmolab/src/gemini.ts"
      - "apps/karmolab/src/widgets/chatbot/**"
      - "apps/karmolab/src/ai/**"
      - "packages/karmolab-ai/**"
      - ".github/workflows/ai-quality.yml"

jobs:
  karmolab-ai-surface:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/karmolab/package-lock.json

      - name: KarmoLab typecheck and build
        working-directory: apps/karmolab
        run: |
          npm ci
          npm run typecheck
          npm run build

  shared-ai-package-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: packages/karmolab-ai/package-lock.json

      - name: Build karmolab-ai package
        working-directory: packages/karmolab-ai
        run: |
          npm ci
          npm run build
