name: CI / Code Quality

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint-and-typecheck:
    name: Lint & Typecheck (Node.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          # monorepo의 경우 루트 또는 apps 폴더 내에 package.json 위치 기반으로 지정
          cache-dependency-path: '**/package-lock.json'
      - name: Install dependencies
        run: npm ci
        working-directory: apps/karmolab # karmolab 등 특정 앱 폴더 기준
        continue-on-error: true # 초기 세팅을 위함
      # 향후 eslint나 tsc 명령어 실행 라인을 추가하여 CI를 엄격하게 제한합니다.

  typos:
    name: Check Typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Typos Check
        uses: crate-ci/typos@master
        continue-on-error: true
