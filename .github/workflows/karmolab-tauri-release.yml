name: KarmoLab Tauri Release

on:
  workflow_dispatch:
  push:
    tags:
      - "karmolab-v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    runs-on: windows-latest
    defaults:
      run:
        working-directory: apps/karmolab-tauri

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/karmolab-tauri/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/karmolab-tauri
          tauriScript: npm run tauri
          args: --config src-tauri/tauri.release.conf.json
          tagName: karmolab-v__VERSION__
          releaseName: KarmoLab v__VERSION__
          releaseBody: KarmoLab Windows release.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: true
          updaterJsonPreferNsis: true