name: "Build and Deploy"
on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - .gitignore
      - README.md
      - LICENSE

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUSKY: "0"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.4
          bundler-cache: true
          working-directory: apps/blog

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/blog/package-lock.json

      - name: Install blog dependencies
        working-directory: apps/blog
        run: npm ci

      - name: Build theme assets (CSS and JS)
        working-directory: apps/blog
        run: npm run build

      - name: Build post graph data
        working-directory: apps/blog
        run: npm run build:graph

      - name: Build KarmoLab React App
        working-directory: apps/karmolab-react-src
        run: |
          npm ci
          npm run build
        env:
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}

      - name: Build KarmoLab JavaScript (TypeScript)
        working-directory: apps/karmolab
        run: |
          npm ci
          npm run build

      - name: Prepare KarmoLab Jekyll page
        run: |
          mkdir -p apps/blog/karmolab
          cp apps/karmolab/index.html apps/blog/karmolab/index.html

      - name: Build site
        working-directory: apps/blog
        run: bundle exec jekyll b -d "_site${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: "production"

      - name: Merge KarmoLab output to site
        run: |
          mkdir -p apps/blog/_site/apps/karmolab
          rsync -a --exclude 'node_modules' apps/karmolab/ apps/blog/_site/apps/karmolab/
          mkdir -p apps/blog/_site/apps/karmolab-react-src
          rsync -a --exclude 'node_modules' apps/karmolab-react-src/ apps/blog/_site/apps/karmolab-react-src/

      - name: Test site
        working-directory: apps/blog
        run: |
        #    bundle exec htmlproofer _site \
        #      \-\-disable-external \
        #      \-\-ignore-urls "/^http:\/\/127.0.0.1/,/^http:\/\/0.0.0.0/,/^http:\/\/localhost/"

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "apps/blog/_site${{ steps.pages.outputs.base_path }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
