<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Quest Log</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;700;900&family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0d12;
    --bg-2: #0f1218;
    --paper: #12151c;
    --paper-2: #171a22;
    --ink: #f2f2ee;
    --ink-2: #9a9a94;
    --ink-3: #55555a;
    --ink-4: #33363d;
    --line: #1f242d;
    --line-2: #2a3040;
    --line-3: #3d4557;
    --accent: #e8d9a8;   /* warm starlight */
    --accent-2: #7fa6d4; /* cool starlight */
    --mag-wm: #e8d9a8;
    --mag-project: #9ec4a8;
    --mag-learn: #b7a3d6;
    --mag-life: #d8a4a0;
    --mag-career: #7fa6d4;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; color: var(--ink); font-family: 'Noto Sans KR', system-ui, sans-serif; background: var(--bg); min-height: 100vh; }
  .serif { font-family: 'Noto Serif KR', serif; }
  .mono { font-family: 'JetBrains Mono', monospace; }

  ::selection { background: var(--accent); color: var(--bg); }

  /* grid backdrop — like observatory paper */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  .return-link {
    position: fixed; top: 14px; right: 14px; z-index: 50;
    font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-2); text-decoration: none;
    padding: 7px 14px; border: 1px solid var(--line-2); background: var(--paper);
  }
  .return-link:hover { color: var(--ink); border-color: var(--ink); }

  .wrap { max-width: 1320px; margin: 0 auto; padding: 36px 28px 80px; position: relative; z-index: 1; }

  /* ── HEADER ────────────────────────────────────────── */
  header.hd {
    display: grid; grid-template-columns: auto 1fr auto; gap: 28px; align-items: end;
    padding-bottom: 16px; border-bottom: 1px solid var(--line-2); margin-bottom: 18px;
  }
  header.hd .mark {
    width: 68px; height: 68px; border: 1px solid var(--ink); border-radius: 50%;
    display: flex; align-items: center; justify-content: center; position: relative;
  }
  header.hd .mark::before, header.hd .mark::after {
    content: ''; position: absolute; background: var(--ink);
  }
  header.hd .mark::before { width: 1px; height: 100%; left: 50%; }
  header.hd .mark::after { width: 100%; height: 1px; top: 50%; }
  header.hd .mark .inner {
    position: relative; width: 18px; height: 18px; border-radius: 50%;
    background: var(--bg); border: 1px solid var(--ink);
    display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 8px; color: var(--ink);
  }
  header.hd .t .eye {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.3em; text-transform: uppercase; color: var(--ink-2); margin-bottom: 8px;
  }
  header.hd .t .eye b { color: var(--ink); font-weight: 500; }
  header.hd .t h1 {
    margin: 0; font-family: 'Noto Serif KR', serif; font-weight: 900;
    font-size: clamp(32px, 4.2vw, 48px); line-height: 1; letter-spacing: -0.02em;
  }
  header.hd .t h1 em { font-style: italic; font-weight: 500; color: var(--ink-2); }
  header.hd .r {
    text-align: right; font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ink-3); letter-spacing: 0.22em; text-transform: uppercase; line-height: 1.9;
  }
  header.hd .r .k { color: var(--ink-3); }
  header.hd .r .v { color: var(--ink); }
  header.hd .r .live { color: var(--accent); }
  header.hd .r .live::before { content: '●'; margin-right: 4px; animation: blink 2s infinite; }
  @keyframes blink { 50% { opacity: 0.3; } }

  /* ── STATS STRIP ───────────────────────────────────── */
  .stats {
    display: grid; grid-template-columns: repeat(6, 1fr); gap: 1px;
    background: var(--line-2); border: 1px solid var(--line-2);
    margin-bottom: 22px;
  }
  .stat { background: var(--paper); padding: 12px 16px; display: flex; flex-direction: column; gap: 3px; }
  .stat .k {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-3);
  }
  .stat .v {
    font-family: 'Noto Serif KR', serif; font-weight: 700;
    font-size: 22px; line-height: 1; letter-spacing: -0.01em;
  }
  .stat .v small { font-family: 'JetBrains Mono', monospace; font-weight: 400; font-size: 11px; color: var(--ink-2); margin-left: 3px; }
  .stat.accent .v { color: var(--accent); }

  /* ── CONTROL BAR ───────────────────────────────────── */
  .controls {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    padding: 12px 14px; background: var(--paper); border: 1px solid var(--line-2);
    margin-bottom: 22px;
  }
  .controls .label {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.24em; text-transform: uppercase; color: var(--ink-3);
    margin-right: 4px;
  }
  .filter-group { display: flex; gap: 4px; flex-wrap: wrap; }
  .chip {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-2);
    padding: 5px 10px; border: 1px solid var(--line-2); background: transparent;
    cursor: pointer; transition: all 140ms; display: inline-flex; align-items: center; gap: 6px;
  }
  .chip:hover { border-color: var(--ink-2); color: var(--ink); }
  .chip.on { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .chip .sw { width: 6px; height: 6px; border-radius: 50%; background: currentColor; opacity: 0.7; }
  .chip[data-lane="wm"] .sw { background: var(--mag-wm); }
  .chip[data-lane="project"] .sw { background: var(--mag-project); }
  .chip[data-lane="learn"] .sw { background: var(--mag-learn); }
  .chip[data-lane="life"] .sw { background: var(--mag-life); }
  .chip[data-lane="career"] .sw { background: var(--mag-career); }
  .divider { width: 1px; height: 20px; background: var(--line-2); }
  .spacer { flex: 1; }
  .result-count {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-2);
  }
  .result-count b { color: var(--ink); }

  /* ── COLUMNS ───────────────────────────────────────── */
  .columns { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

  .col {
    border: 1px solid var(--line-2); background: var(--paper);
    display: flex; flex-direction: column; position: relative;
  }
  .col::before {
    content: ''; position: absolute; top: -1px; left: -1px; width: 10px; height: 10px;
    border-top: 1px solid var(--ink); border-left: 1px solid var(--ink);
  }
  .col::after {
    content: ''; position: absolute; bottom: -1px; right: -1px; width: 10px; height: 10px;
    border-bottom: 1px solid var(--line-3); border-right: 1px solid var(--line-3);
  }

  .col-head {
    padding: 14px 16px 12px; border-bottom: 1px solid var(--line-2);
    display: grid; grid-template-columns: 1fr auto; gap: 6px; align-items: baseline;
  }
  .col-head h3 {
    margin: 0; font-family: 'Noto Serif KR', serif; font-weight: 700;
    font-size: 20px; letter-spacing: -0.01em; display: flex; align-items: baseline; gap: 8px;
  }
  .col-head h3 .idx {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    font-weight: 400; color: var(--ink-3); letter-spacing: 0.18em;
  }
  .col-head .sub {
    font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-2);
    text-align: right;
  }
  .col-head .bar-line {
    grid-column: 1 / -1; height: 2px; background: var(--line); margin-top: 6px;
    position: relative; overflow: hidden;
  }
  .col-head .bar-line .fill {
    position: absolute; inset: 0 auto 0 0; background: var(--accent);
    transition: width 400ms ease;
  }
  .col-head .bar-meta {
    grid-column: 1 / -1;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3);
    display: flex; justify-content: space-between; margin-top: 4px;
  }
  .col-head .bar-meta b { color: var(--ink-2); font-weight: 400; }

  /* ── SKY PATCH ─────────────────────────────────────── */
  .sky {
    aspect-ratio: 16/8; border-bottom: 1px solid var(--line-2);
    position: relative; overflow: hidden;
    background: radial-gradient(ellipse at 30% 60%, #182033 0%, #0a0d14 70%);
  }
  .sky.photo { background: #0a0d14; }
  .sky.photo img {
    width: 100%; height: 100%; object-fit: cover;
    filter: grayscale(1) contrast(1.15) brightness(0.7) saturate(0);
  }
  .sky.photo::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(11,13,18,0.25) 0%, rgba(11,13,18,0.8) 100%);
  }
  .sky svg { position: absolute; inset: 0; width: 100%; height: 100%; }
  .sky .coord {
    position: absolute; left: 12px; top: 12px; z-index: 3;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--ink-2); letter-spacing: 0.15em; line-height: 1.7;
  }
  .sky .coord .k { color: var(--ink-3); }
  .sky .tag {
    position: absolute; right: 12px; bottom: 12px; z-index: 3;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--ink-2); letter-spacing: 0.18em; text-transform: uppercase;
    padding: 3px 7px; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.08);
  }

  /* ── LOG LIST ──────────────────────────────────────── */
  .log { padding: 8px 16px 12px; flex: 1; display: flex; flex-direction: column; }

  .obs {
    display: grid; grid-template-columns: 60px 1fr auto;
    gap: 12px; align-items: baseline;
    padding: 12px 0 11px; border-bottom: 1px dashed var(--line-2);
    cursor: pointer;
    transition: background 120ms, padding 120ms;
    position: relative;
  }
  .obs:last-child { border-bottom: none; }
  .obs::before {
    content: ''; position: absolute; left: -16px; top: 50%; transform: translateY(-50%);
    width: 3px; height: 0; background: var(--accent); transition: height 160ms;
  }
  .obs:hover { background: var(--bg-2); margin: 0 -16px; padding-left: 16px; padding-right: 16px; }
  .obs:hover::before { height: 60%; left: 0; }
  .obs.selected { background: var(--bg-2); margin: 0 -16px; padding-left: 16px; padding-right: 16px; }
  .obs.selected::before { height: 70%; left: 0; }

  .obs .time {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ink-3); letter-spacing: 0.08em; line-height: 1.4;
  }
  .obs .time b { color: var(--ink-2); font-weight: 500; display: block; }
  .obs .body .lane {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-3);
    margin-bottom: 3px; display: flex; align-items: center; gap: 6px;
  }
  .obs .body .lane .sw { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
  .obs[data-lane="wm"] .body .lane .sw { background: var(--mag-wm); }
  .obs[data-lane="project"] .body .lane .sw { background: var(--mag-project); }
  .obs[data-lane="learn"] .body .lane .sw { background: var(--mag-learn); }
  .obs[data-lane="life"] .body .lane .sw { background: var(--mag-life); }
  .obs[data-lane="career"] .body .lane .sw { background: var(--mag-career); }

  .obs .body .t {
    font-family: 'Noto Serif KR', serif; font-weight: 500;
    font-size: 15.5px; letter-spacing: -0.01em; line-height: 1.3;
  }
  .obs .body .n {
    margin-top: 4px; font-size: 11.5px; color: var(--ink-2); line-height: 1.55;
  }
  .obs .body .mini-bar {
    margin-top: 6px; height: 2px; background: var(--line); width: 70%;
    position: relative; overflow: hidden;
  }
  .obs .body .mini-bar .f {
    position: absolute; inset: 0 auto 0 0; background: var(--ink-2);
  }
  .obs[data-status="done"] .body .mini-bar .f { background: var(--ink); width: 100% !important; }
  .obs[data-status="in-progress"] .body .mini-bar .f { background: var(--accent); }

  .obs .mag {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-3);
    padding: 3px 7px; border: 1px solid var(--line-2);
    white-space: nowrap; align-self: start;
  }
  .obs[data-status="in-progress"] .time b { color: var(--ink); }
  .obs[data-status="in-progress"] .body .t::before {
    content: '✦'; color: var(--accent); margin-right: 6px; font-size: 13px;
    display: inline-block; animation: twinkle 3s ease-in-out infinite;
  }
  @keyframes twinkle { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
  .obs[data-status="done"] .body .t { color: var(--ink-2); text-decoration: line-through; text-decoration-color: var(--ink-3); text-decoration-thickness: 1px; }
  .obs[data-status="done"] .body .n { color: var(--ink-3); }
  .obs[data-status="in-progress"] .mag { color: var(--bg); background: var(--accent); border-color: var(--accent); }
  .obs[data-status="done"] .mag { background: var(--ink); color: var(--bg); border-color: var(--ink); }

  .empty {
    padding: 32px 0; text-align: center; color: var(--ink-3);
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.22em; text-transform: uppercase;
  }
  .empty::before, .empty::after {
    content: '— '; opacity: 0.6;
  }
  .empty::after { content: ' —'; }

  /* ── DETAIL DRAWER ─────────────────────────────────── */
  .drawer {
    position: fixed; inset: 0 0 0 auto; width: min(520px, 92vw);
    background: var(--paper); border-left: 1px solid var(--line-3);
    transform: translateX(100%); transition: transform 280ms cubic-bezier(0.22, 0.9, 0.32, 1);
    z-index: 100; overflow-y: auto;
    box-shadow: -40px 0 80px rgba(0,0,0,0.4);
  }
  .drawer.open { transform: translateX(0); }
  .drawer-backdrop {
    position: fixed; inset: 0; background: rgba(5,7,11,0.6); backdrop-filter: blur(4px);
    z-index: 99; opacity: 0; pointer-events: none; transition: opacity 220ms;
  }
  .drawer-backdrop.open { opacity: 1; pointer-events: auto; }

  .drawer-head {
    padding: 18px 24px; border-bottom: 1px solid var(--line-2);
    display: flex; justify-content: space-between; align-items: center;
    position: sticky; top: 0; background: var(--paper); z-index: 2;
  }
  .drawer-head .crumb {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-3);
  }
  .drawer-head .crumb b { color: var(--ink); }
  .drawer-close {
    background: transparent; border: 1px solid var(--line-2); color: var(--ink-2);
    font-family: 'JetBrains Mono', monospace; font-size: 12px;
    width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .drawer-close:hover { border-color: var(--ink); color: var(--ink); }

  .drawer-body { padding: 28px 28px 40px; }
  .drawer-body .lane-pill {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-2);
    padding: 5px 10px; border: 1px solid var(--line-2);
  }
  .drawer-body .lane-pill .sw { width: 6px; height: 6px; border-radius: 50%; }
  .drawer-body h2 {
    margin: 16px 0 10px; font-family: 'Noto Serif KR', serif; font-weight: 700;
    font-size: 32px; line-height: 1.1; letter-spacing: -0.02em;
  }
  .drawer-body h2 em { font-style: italic; font-weight: 400; color: var(--ink-2); }
  .drawer-body .lede {
    font-size: 14.5px; color: var(--ink-2); line-height: 1.65; max-width: 52ch;
  }
  .drawer-body .kv {
    margin-top: 24px;
    display: grid; grid-template-columns: 120px 1fr; gap: 4px 18px;
    border-top: 1px solid var(--line-2); padding-top: 18px;
  }
  .drawer-body .kv dt {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-3);
    padding: 8px 0;
  }
  .drawer-body .kv dd {
    margin: 0; padding: 8px 0;
    font-size: 13.5px; color: var(--ink); line-height: 1.5;
    border-bottom: 1px dashed var(--line-2);
  }
  .drawer-body .kv dt + dd { border-bottom: 1px dashed var(--line-2); }
  .drawer-body .progress-wrap {
    margin-top: 24px; padding-top: 18px; border-top: 1px solid var(--line-2);
  }
  .drawer-body .progress-wrap .lbl {
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-3);
    margin-bottom: 8px;
  }
  .drawer-body .progress-wrap .lbl b {
    font-family: 'Noto Serif KR', serif; font-size: 20px; color: var(--ink); letter-spacing: -0.01em;
    font-weight: 700;
  }
  .drawer-body .progress-wrap .bar {
    height: 3px; background: var(--line); position: relative; overflow: hidden;
  }
  .drawer-body .progress-wrap .bar .f {
    position: absolute; inset: 0 auto 0 0; background: var(--accent);
  }
  .drawer-body .progress-wrap .ticks {
    display: flex; justify-content: space-between; margin-top: 4px;
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    color: var(--ink-3); letter-spacing: 0.18em;
  }
  .drawer-body .notes {
    margin-top: 24px; padding: 16px;
    background: var(--bg-2); border-left: 2px solid var(--accent);
  }
  .drawer-body .notes .h {
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--ink-3);
    margin-bottom: 8px;
  }
  .drawer-body .notes .t {
    font-family: 'Noto Serif KR', serif; font-size: 14.5px; line-height: 1.6; color: var(--ink);
    font-style: italic;
  }

  /* ── FOOTER ────────────────────────────────────────── */
  .footer {
    margin-top: 48px; padding: 18px 0; border-top: 1px solid var(--line-2);
    display: flex; justify-content: space-between; flex-wrap: wrap; gap: 12px;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    letter-spacing: 0.24em; text-transform: uppercase; color: var(--ink-3);
  }

  /* ── FEATURED + GRID LAYOUT ────────────────────────── */
  .featured {
    border: 1px solid var(--line-2); background: var(--paper);
    margin-bottom: 20px; position: relative;
    display: grid; grid-template-columns: 1.1fr 1.5fr;
  }
  .featured::before {
    content: ''; position: absolute; top: -1px; left: -1px; width: 14px; height: 14px;
    border-top: 1px solid var(--accent); border-left: 1px solid var(--accent);
  }
  .featured::after {
    content: ''; position: absolute; bottom: -1px; right: -1px; width: 14px; height: 14px;
    border-bottom: 1px solid var(--line-3); border-right: 1px solid var(--line-3);
  }
  .featured .f-left { display: flex; flex-direction: column; border-right: 1px solid var(--line-2); }
  .featured .f-sky { aspect-ratio: auto; flex: 1; min-height: 280px; border-bottom: 1px solid var(--line-2); position: relative; overflow: hidden; }
  .featured .f-sky img {
    width: 100%; height: 100%; object-fit: cover;
    filter: grayscale(1) contrast(1.15) brightness(0.65) saturate(0);
  }
  .featured .f-sky::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(to bottom, rgba(11,13,18,0.2) 0%, rgba(11,13,18,0.8) 100%);
  }
  .featured .f-sky .coord {
    position: absolute; left: 14px; top: 14px; z-index: 3;
    font-family: 'JetBrains Mono', monospace; font-size: 9.5px;
    color: var(--ink-2); letter-spacing: 0.15em; line-height: 1.8;
  }
  .featured .f-sky .coord .k { color: var(--ink-3); }
  .featured .f-sky .tag {
    position: absolute; right: 14px; bottom: 14px; z-index: 3;
    font-family: 'JetBrains Mono', monospace; font-size: 10px;
    color: var(--ink); letter-spacing: 0.2em; text-transform: uppercase;
    padding: 4px 9px; background: rgba(0,0,0,0.55); border: 1px solid var(--line-3);
  }
  .featured .f-sky .overlay-title {
    position: absolute; left: 20px; right: 20px; bottom: 42px; z-index: 3;
    pointer-events: none;
  }
  .featured .f-sky .overlay-title .cst {
    font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: 0.3em; color: var(--accent); text-transform: uppercase;
  }
  .featured .f-sky .overlay-title .name {
    font-family: 'Noto Serif KR', serif; font-style: italic; font-weight: 500;
    font-size: 30px; color: var(--ink); line-height: 1.05; margin-top: 4px;

  .featured .f-meta {

  /* ── NEW: status-coloured obs rows ─ */

  /* ── NEW: checklist in drawer ── */
  .checklist { display: flex; flex-direction: column; gap: 2px; }
  .check-row {
    display: flex; align-items: flex-start; gap: 10px;

  .check-row.done .check-box { background: var(--accent); border-color: var(--accent); }
  .check-row.done .check-box::after {
    content: '✓'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--bg); font-size: 10px; font-weight: 700;

  /* ── child row (area with sub-areas) ── */

    display: grid; grid-template-columns: 70px 1fr auto; gap: 12px; align-items: center;

  .cr-status {

  }
  .cr-status.fire { color: var(--accent); border-color: var(--accent); }
  .cr-status.sealed { background: var(--ink); color: var(--bg); border-color: var(--ink); }
  .cr-title { font-family: 'Noto Serif KR', serif; font-size: 14.5px; color: var(--ink); }
  .cr-right { display: flex; align-items: center; }

  /* ── seal button ── */
  .seal-btn {
    margin-top: 22px; width: 100%; background: var(--ink); color: var(--bg);

  /* ── sleep prompt modal ── */

  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .sleep-prompt {

  .sp-moon {

  @media (max-width: 1000px) {

</style>

<script>
(() => {
  const STORAGE_KEY = 'quest-log-state-v1';
  const SRC = window.QUEST_DATA;

  // ── Persistence ──
  function loadStored() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)); } catch(e) { return null; }
  }
  function save() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ projects: DATA.projects, sealed: DATA.sealed })); } catch(e){}
  }
  const stored = loadStored();
  const DATA = {
    projects: stored?.projects ?? SRC.projects,
    sealed: stored?.sealed ?? SRC.sealed,
  };

  // ── Star-chart constants (Observatory look) ──
  const HEROES = ['assets/hero-bunny.png', 'assets/hero-squat.png'];
  const CONST_BY_PROJECT = {
    wm:     { name: 'Venefica',  sub: 'the witch',    mag: '1.2' },
    blog:   { name: 'Scriba',    sub: 'the scribe',   mag: '2.8' },
    learn:  { name: 'Discipulus',sub: 'the student',  mag: '3.1' },
    travel: { name: 'Viator',    sub: 'the wanderer', mag: '2.5' },
    body:   { name: 'Corpus',    sub: 'the body',     mag: '3.4' },
  };

  // ── Tree helpers ──
  function findNode(id, nodes = DATA.projects, parents = []) {
    for (const n of nodes) {
      if (n.id === id) return { node: n, parents };
      if (n.children) {
        const f = findNode(id, n.children, [...parents, n]);
        if (f) return f;
      }
    }
    return null;
  }
  function isLeaf(n) { return Array.isArray(n.checks); }
  function allLeaves(n, out = []) {
    if (isLeaf(n)) { out.push(n); return out; }
    if (n.children) n.children.forEach(c => allLeaves(c, out));
    return out;
  }
  function progressOf(n) {
    if (isLeaf(n)) return n.checks.length ? n.checks.filter(c=>c.done).length / n.checks.length : 0;
    if (!n.children || !n.children.length) return 0;
    return n.children.reduce((s,c) => s + progressOf(c), 0) / n.children.length;
  }
  function findProjectOf(id) {
    const f = findNode(id);
    if (!f) return null;
    return f.parents[0] || f.node;
  }
  function findAreaOf(id) {
    const f = findNode(id);
    if (!f) return null;
    // area = direct child of project = parents[1] if exists, else parents[0] (if leaf is direct child of project)
    return f.parents[1] || f.parents[0];
  }

  // ── Deterministic RA/DEC ──
  function hash(s) { let h = 0; for (let i=0;i<s.length;i++){ h = ((h<<5)-h) + s.charCodeAt(i); h |= 0; } return Math.abs(h); }
  function coords(idx) {
    const ra = (idx * 3.7 + 1) % 24;
    const dec = ((idx * 11.2) % 60) + 12;
    const rah = Math.floor(ra);
    const ram = Math.floor((ra - rah) * 60);
    const decd = Math.floor(dec);
    const decm = Math.floor((dec - decd) * 60);
    return { rah: String(rah).padStart(2,'0'), ram: String(ram).padStart(2,'0'),
             decd: String(decd).padStart(2,'0'), decm: String(decm).padStart(2,'0') };
  }

  // ── State ──
  const state = {
    projects: new Set(DATA.projects.map(p => p.id)),
    statuses: new Set(['fire', 'seed', 'sleep']),   // sealed shown in trophy tab
    view: 'log',     // 'log' | 'trophy'
    selectedId: null,
    sleepPromptFor: null,
    dismissedSleepPrompts: new Set(),
  };

  // ── Escape ──
  function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c])); }

  // ── Stars (★) ──
  function starsHTML(progress, large=false) {
    const filled = progress * 5;
    const full = Math.floor(filled);
    const hasHalf = (filled - full) >= 0.25 && (filled - full) < 0.75;
    const svg = '<svg viewBox="0 0 24 24" width="100%" height="100%"><path d="M12 2l2.9 6.95 7.6.6-5.75 4.95L18.4 22 12 17.9 5.6 22l1.65-7.5L1.5 9.55l7.6-.6z" fill="currentColor"/></svg>';
    let html = '<span class="stars' + (large ? ' large' : '') + '">';
    for (let i = 0; i < 5; i++) {
      let cls = '';
      if (i < full) cls = 'filled';
      else if (i === full && hasHalf) cls = 'half';
      html += '<span class="star ' + cls + '">' + svg + '</span>';
    }
    html += '</span>';
    return html;
  }

  // ── Stats ──
  function renderStats() {
    // gather all leaves (tasks)
    const all = [];
    DATA.projects.forEach(p => allLeaves(p).forEach(l => all.push(l)));
    const fire  = all.filter(l => l.status === 'fire').length;
    const seed  = all.filter(l => l.status === 'seed').length;
    const sleep = all.filter(l => l.status === 'sleep').length;
    const sealed = DATA.sealed.length;
    const coverage = all.length ? Math.round(all.reduce((s,l) => s + progressOf(l), 0) / all.length * 100) : 0;
    const projectCount = DATA.projects.length;

    document.getElementById('stats').innerHTML = `
      <div class="stat"><div class="k">TOTAL</div><div class="v">${all.length}</div></div>
      <div class="stat accent"><div class="k">FIRE</div><div class="v">${fire}<small>now burning</small></div></div>
      <div class="stat"><div class="k">SEED</div><div class="v">${seed}</div></div>
      <div class="stat"><div class="k">SLEEP</div><div class="v">${sleep}</div></div>
      <div class="stat"><div class="k">COVERAGE</div><div class="v">${coverage}<small>%</small></div></div>
      <div class="stat"><div class="k">SEALED</div><div class="v">${sealed}<small>in trophy</small></div></div>
    `;
  }

  // ── Filters ──
  function renderFilters() {
    const lf = document.getElementById('lane-filters');
    lf.innerHTML = DATA.projects.map(p => `
      <button class="chip" data-proj="${p.id}"><span class="sw"></span>${esc(p.title.length > 16 ? p.title.slice(0,14)+'…' : p.title)}</button>
    `).join('') + '<button class="chip" data-action="all-projects" style="font-style:italic;">ALL</button>';

    const sf = document.getElementById('status-filters');
    sf.innerHTML = `
      <button class="chip" data-status="fire">◉ FIRE</button>
      <button class="chip" data-status="seed">○ SEED</button>
      <button class="chip" data-status="sleep">─ SLEEP</button>
      <button class="chip" data-action="trophy" style="margin-left:8px;">◆ TROPHY <span id="trophy-count"></span></button>
    `;

    updateChipStates();

    lf.addEventListener('click', e => {
      const btn = e.target.closest('.chip'); if (!btn) return;
      if (btn.dataset.action === 'all-projects') {
        if (state.projects.size === DATA.projects.length) state.projects = new Set([DATA.projects[0].id]);
        else state.projects = new Set(DATA.projects.map(p => p.id));
      } else {
        const id = btn.dataset.proj;
        if (state.projects.has(id)) state.projects.delete(id); else state.projects.add(id);
        if (state.projects.size === 0) state.projects = new Set(DATA.projects.map(p => p.id));
      }
      updateChipStates(); renderColumns();
    });
    sf.addEventListener('click', e => {
      const btn = e.target.closest('.chip'); if (!btn) return;
      if (btn.dataset.action === 'trophy') {
        state.view = state.view === 'trophy' ? 'log' : 'trophy';
        updateChipStates(); renderColumns();
        return;
      }
      const id = btn.dataset.status;
      if (state.statuses.has(id)) state.statuses.delete(id); else state.statuses.add(id);
      if (state.statuses.size === 0) state.statuses = new Set(['fire','seed','sleep']);
      updateChipStates(); renderColumns();
    });
  }
  function updateChipStates() {
    document.querySelectorAll('#lane-filters .chip').forEach(c => {
      if (c.dataset.action === 'all-projects') {
        c.classList.toggle('on', state.projects.size === DATA.projects.length);
      } else {
        c.classList.toggle('on', state.projects.has(c.dataset.proj));
      }
    });
    document.querySelectorAll('#status-filters .chip').forEach(c => {
      if (c.dataset.action === 'trophy') {
        c.classList.toggle('on', state.view === 'trophy');
        const tc = document.getElementById('trophy-count');
        if (tc) tc.textContent = DATA.sealed.length ? '(' + DATA.sealed.length + ')' : '';
      } else {
        c.classList.toggle('on', state.statuses.has(c.dataset.status));
      }
    });
  }

  // ── Sky (star chart) ──
  function skyHTML(idx, photo) {
    const { rah, ram, decd, decm } = coords(idx);
    if (photo) {
      const img = HEROES[idx % HEROES.length];
      return `
        <div class="sky photo">
          <img src="${img}" alt="">
          <div class="coord"><span class="k">RA</span> ${rah}<sup>h</sup> ${ram}<sup>m</sup><br><span class="k">DEC</span> +${decd}° ${decm}'</div>
          <div class="tag">PLATE 00${idx+1}</div>
        </div>
      `;
    }
    const stars = [];
    for (let i = 0; i < 14; i++) {
      const h = hash('s' + idx + i);
      stars.push({ x: h % 100, y: ((h>>8) % 80) + 10, r: ((h>>16) % 15)/10 + 0.4, bright: i < 5 });
    }
    const bright = stars.filter(s => s.bright);
    let lines = '';
    for (let i = 0; i < bright.length - 1; i++) {
      lines += `<line x1="${bright[i].x}" y1="${bright[i].y}" x2="${bright[i+1].x}" y2="${bright[i+1].y}" stroke="var(--line-3)" stroke-width="0.18" stroke-dasharray="0.6 0.8" opacity="0.7" />`;
    }
    const hasMoon = idx === 2 || idx === 5;
    const moonX = 65 + (idx * 7) % 20;
    const moonY = 28 + (idx * 3) % 15;
    return `
      <div class="sky">
        <svg viewBox="0 0 100 50" preserveAspectRatio="xMidYMid slice">
          <defs>
            <radialGradient id="g${idx}">
              <stop offset="0" stop-color="#233049" stop-opacity="0.9"/>
              <stop offset="1" stop-color="#0a0d14" stop-opacity="1"/>
            </radialGradient>
          </defs>
          <rect width="100" height="50" fill="url(#g${idx})"/>
          ${lines}
          ${stars.map(s => `<circle cx="${s.x}" cy="${s.y}" r="${s.r}" fill="${s.bright ? '#f2f2ee' : '#9a9a94'}" opacity="${s.bright ? 1 : 0.7}"/>`).join('')}
          ${bright.slice(0,3).map(s => `<circle cx="${s.x}" cy="${s.y}" r="${s.r * 2.5}" fill="none" stroke="#f2f2ee" stroke-width="0.15" opacity="0.3"/>`).join('')}
          ${hasMoon ? `<circle cx="${moonX}" cy="${moonY}" r="5" fill="#e8d9a8" opacity="0.95"/><circle cx="${moonX - 1.5}" cy="${moonY - 0.5}" r="4.2" fill="#0a0d14" opacity="0.25"/>` : ''}
        </svg>
        <div class="coord"><span class="k">RA</span> ${rah}<sup>h</sup> ${ram}<sup>m</sup><br><span class="k">DEC</span> +${decd}° ${decm}'</div>
        <div class="tag">FIELD 00${idx+1}</div>
      </div>
    `;
  }

  // ── Obs row (a single task/leaf) ──
  function obsRow(leaf, projectId) {
    const area = findAreaOf(leaf.id);
    const progress = Math.round(progressOf(leaf) * 100);
    const status = leaf.status || 'seed';
    const areaLabel = area && area.id !== leaf.id ? area.title : '';
    const checkN = leaf.checks.length;
    const checkDone = leaf.checks.filter(c => c.done).length;
    return `
      <div class="obs ${state.selectedId === leaf.id ? 'selected' : ''}" data-status="${status}" data-proj="${projectId}" data-id="${leaf.id}">
        <div class="time">
          <b>${checkDone}/${checkN}</b>
          ${progress}%
        </div>
        <div class="body">
          <div class="lane"><span class="sw"></span>${esc(areaLabel ? areaLabel.toUpperCase() : 'DIRECT')}</div>
          <div class="t serif">${esc(leaf.title)}</div>
          ${leaf.note ? `<div class="n">${esc(leaf.note)}</div>` : ''}
          ${status !== 'seed' ? `<div class="mini-bar"><div class="f" style="width:${progress}%"></div></div>` : ''}
        </div>
        <div class="mag">${status.toUpperCase()}</div>
      </div>
    `;
  }

  // ── Columns ──
  function renderColumns() {
    if (state.view === 'trophy') { renderTrophyView(); return; }

    // all leaves across projects, filtered
    const wm = DATA.projects.find(p => p.id === 'wm');
    const others = DATA.projects.filter(p => p.id !== 'wm');

    // Featured: WM
    const fw = document.getElementById('featured-wrap');
    if (state.projects.has('wm') && wm) {
      const wmLeaves = allLeaves(wm).filter(l => state.statuses.has(l.status || 'seed'));
      const wmAll = allLeaves(wm);
      const wmFire = wmAll.filter(l => l.status === 'fire').length;
      const wmSealedCount = DATA.sealed.filter(s => s.project === wm.title).length;
      const wmProg = wmAll.length ? Math.round(wmAll.reduce((s,l) => s + progressOf(l), 0) / wmAll.length * 100) : 0;
      const cst = CONST_BY_PROJECT.wm;
      const { rah, ram, decd, decm } = coords(0);

      fw.innerHTML = `
        <div class="featured">
          <div class="f-left">
            <div class="f-sky">
              <img src="assets/hero-bunny.png" alt="">
              <div class="coord"><span class="k">RA</span> ${rah}<sup>h</sup> ${ram}<sup>m</sup><br><span class="k">DEC</span> +${decd}° ${decm}'<br><span class="k">MAG</span> ${cst.mag}</div>
              <div class="tag">★ MAIN PROJECT</div>
              <div class="overlay-title">
                <div class="cst">✓ ${esc(cst.name.toUpperCase())} · ${esc(cst.sub)}</div>
                <div class="name">${esc(wm.title)}</div>
              </div>
            </div>
            <div class="f-meta">
              <div class="eye">№ 00 · PRIMARY TARGET</div>
              <h2 class="serif">${esc(wm.title)}<em>${esc(wm.subtitle || '')}</em></h2>
              <div class="dek">${wm.children.length}개 영역. 채광, 전투, 농사, 마을 경영, 인형 부리기, 수집, 냚시, 스토리 — 기초 시스템들이 하나씩 자리를 잡으면 게임의 재미가 드러난다.</div>
              <div class="bar-line"><div class="fill" style="width:${wmProg}%"></div></div>
              <div class="mini-stats">
                <div class="s accent"><div class="k">FIRE</div><div class="v">${wmFire}</div></div>
                <div class="s"><div class="k">SEALED</div><div class="v">${wmSealedCount}</div></div>
                <div class="s"><div class="k">COVERAGE</div><div class="v">${wmProg}<span style="font-family:'JetBrains Mono',monospace;font-weight:400;font-size:11px;color:var(--ink-2);margin-left:2px;">%</span></div></div>
              </div>
            </div>
          </div>
          <div class="f-right">
            <div class="log-head"><span>TASK LOG</span><span><b>${wmLeaves.length}</b> / ${wmAll.length} TASKS</span></div>
            ${wmLeaves.length ? wmLeaves.map(l => obsRow(l, 'wm')).join('') : '<div class="empty" style="grid-column: 1 / -1;">no tasks match filters</div>'}
          </div>
        </div>
      `;
    } else { fw.innerHTML = ''; }

    // Sub columns: growth projects
    const subEl = document.getElementById('sub-columns');
    subEl.innerHTML = others.map((p, subIdx) => {
      if (!state.projects.has(p.id)) return '';
      const idx = subIdx + 1;
      const all = allLeaves(p);
      const items = all.filter(l => state.statuses.has(l.status || 'seed'));
      const totalP = all.length ? Math.round(all.reduce((s,l) => s + progressOf(l), 0) / all.length * 100) : 0;
      const fireCount = items.filter(l => l.status === 'fire').length;
      const cst = CONST_BY_PROJECT[p.id] || { name: p.title, sub: p.subtitle || '', mag: '—' };

      return `
        <div class="col" data-proj="${p.id}">
          <div class="col-head">
            <h3 class="serif"><span class="idx">№ ${String(idx+1).padStart(2,'0')}</span>${esc(p.title)}</h3>
            <div class="sub">${esc(cst.name)} · <span style="font-style:italic;text-transform:none;letter-spacing:0.05em;">${esc(cst.sub)}</span></div>
            <div class="bar-line"><div class="fill" style="width:${totalP}%"></div></div>
            <div class="bar-meta">
              <b>${items.length} / ${all.length} TASKS</b>
              <span>${fireCount} FIRE · ${totalP}% COVERAGE · MAG ${cst.mag}</span>
            </div>
          </div>
          ${skyHTML(idx, false)}
          <div class="log">
            ${items.length ? items.map(l => obsRow(l, p.id)).join('') : '<div class="empty">no tasks</div>'}
          </div>
        </div>
      `;
    }).join('');

    document.getElementById('count').innerHTML = (() => {
      const all = [];
      DATA.projects.forEach(p => allLeaves(p).forEach(l => all.push({ p, l })));
      const vis = all.filter(({p, l}) => state.projects.has(p.id) && state.statuses.has(l.status || 'seed'));
      return `<b>${vis.length}</b> OF <b>${all.length}</b> VISIBLE`;
    })();

    document.querySelectorAll('.obs').forEach(el => {
      el.addEventListener('click', () => openDrawer(el.dataset.id));
    });
  }

  // ── Trophy view (replaces columns) ──
  function renderTrophyView() {
    const fw = document.getElementById('featured-wrap');
    const subEl = document.getElementById('sub-columns');
    fw.innerHTML = '';
    document.getElementById('count').innerHTML = `<b>${DATA.sealed.length}</b> SEALED ENTRIES`;
    if (DATA.sealed.length === 0) {
      subEl.innerHTML = '<div class="col" style="grid-column:1 / -1;"><div class="log" style="padding:40px;"><div class="empty">no sealed entries yet</div></div></div>';
      return;
    }
    subEl.innerHTML = `
      <div class="col" style="grid-column: 1 / -1;">
        <div class="col-head">
          <h3 class="serif"><span class="idx">◆</span>TROPHY ROOM</h3>
          <div class="sub">SEALED · <span style="font-style:italic;text-transform:none;letter-spacing:0.05em;">봉인된 것들</span></div>
          <div class="bar-line"><div class="fill" style="width:100%;background:var(--accent);"></div></div>
          <div class="bar-meta"><b>${DATA.sealed.length} ENTRIES</b><span>ARCHIVED</span></div>
        </div>
        <div class="log" style="padding: 8px 16px 20px;">
          ${DATA.sealed.map((t, i) => `
            <div class="obs" data-status="done">
              <div class="time"><b>№ ${String(i+1).padStart(3,'0')}</b>SEALED</div>
              <div class="body">
                <div class="lane"><span class="sw"></span>${esc(t.project.toUpperCase())}</div>
                <div class="t serif">${esc(t.title)}</div>
                ${t.note ? `<div class="n">${esc(t.note)}</div>` : ''}
                ${t.sealedNote ? `<div class="n" style="font-style:italic;color:var(--accent);margin-top:6px;">“${esc(t.sealedNote)}”</div>` : ''}
              </div>
              <div class="mag">SEALED</div>
            </div>
          `).join('')}
        </div>
      </div>
    `;
  }

  // ── Drawer (task detail + editable checklist + status toggle) ──
  const drawer = document.getElementById('drawer');
  const backdrop = document.getElementById('backdrop');

  function openDrawer(id) {
    const f = findNode(id);
    if (!f) return;
    const node = f.node;
    const project = f.parents[0];
    const area = f.parents[1];
    state.selectedId = id;
    document.querySelectorAll('.obs').forEach(el => el.classList.toggle('selected', el.dataset.id === id));

    const progress = Math.round(progressOf(node) * 100);
    const status = node.status || 'seed';
    const statusColor = status === 'fire' ? 'var(--accent)' :
                        status === 'sleep' ? 'var(--mag-learn)' :
                        status === 'sealed' ? 'var(--accent)' : 'var(--ink-3)';

    document.getElementById('crumb').innerHTML = `KMLB-QST / <b>${esc(node.id.toUpperCase())}</b>`;
    document.getElementById('drawer-body').innerHTML = `
      <div class="lane-pill"><span class="sw" style="background: var(--accent);"></span>${esc(project ? project.title : '')}${area ? ' · ' + esc(area.title) : ''}</div>
      <h2 class="serif">${esc(node.title)} <em>${status.toUpperCase()}</em></h2>
      ${node.note ? `<p class="lede">${esc(node.note)}</p>` : ''}

      <div class="status-switcher" style="display:flex; gap:1px; margin-top:20px; background:var(--line-2); border:1px solid var(--line-2); width:fit-content;">
        ${['fire','seed','sleep'].map(s => `
          <button class="chip status-toggle ${status === s ? 'on' : ''}" data-set-status="${s}" style="border:none; padding:7px 14px;">
            ${s === 'fire' ? '◉ FIRE' : s === 'seed' ? '○ SEED' : '─ SLEEP'}
          </button>
        `).join('')}
      </div>

      <div class="progress-wrap">
        <div class="lbl"><span>PROGRESS · ${starsHTML(progress/100, false)}</span><b>${progress}%</b></div>
        <div class="bar"><div class="f" style="width:${progress}%; background:${statusColor};"></div></div>
        <div class="ticks"><span>0</span><span>25</span><span>50</span><span>75</span><span>100</span></div>
      </div>

      ${isLeaf(node) ? `
        <div style="margin-top:24px; padding-top:18px; border-top:1px solid var(--line-2);">
          <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px;">
            CHECKLIST · ${node.checks.filter(c=>c.done).length} / ${node.checks.length}
          </div>
          <div class="checklist">
            ${node.checks.map((c, i) => `
              <label class="check-row ${c.done ? 'done' : ''}" data-check-idx="${i}">
                <input type="checkbox" ${c.done ? 'checked' : ''} style="display:none;">
                <span class="check-box"></span>
                <span class="check-label">${esc(c.t)}</span>
              </label>
            `).join('')}
          </div>
          <div class="add-check" style="display:flex; gap:1px; margin-top:12px; background:var(--line-2); border:1px solid var(--line-2);">
            <input type="text" placeholder="+ 새 항목…" />
            <button>ADD</button>
          </div>
        </div>
      ` : `
        <div style="margin-top:24px; padding-top:18px; border-top:1px solid var(--line-2);">
          <div style="font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;color:var(--ink-3);margin-bottom:10px;">
            SUB-AREAS · ${node.children.length}
          </div>
          <div class="children-list">
            ${node.children.map(c => {
              const cp = Math.round(progressOf(c) * 100);
              const cs = c.status || 'seed';
              return `
                <div class="child-row" data-child="${c.id}">
                  <span class="cr-status ${cs}">${cs.toUpperCase()}</span>
                  <span class="cr-title">${esc(c.title)}</span>
                  <span class="cr-right">${starsHTML(cp/100)} <span style="font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--ink-3);margin-left:6px;">${cp}%</span></span>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `}

      ${isLeaf(node) && progress >= 100 ? `
        <button class="seal-btn" data-seal="${node.id}">◆ SEAL TO TROPHY</button>
      ` : ''}
    `;

    // Wire checklist toggles
    document.querySelectorAll('[data-check-idx]').forEach(el => {
      el.addEventListener('click', (e) => {
        e.preventDefault();
        const i = Number(el.dataset.checkIdx);
        node.checks[i].done = !node.checks[i].done;
        save();
        openDrawer(id);
        renderColumns();
        renderStats();
      });
    });

    // Wire status toggles
    document.querySelectorAll('[data-set-status]').forEach(el => {
      el.addEventListener('click', () => {
        const s = el.dataset.setStatus;
        node.status = node.status === s ? 'seed' : s;
        save();
        openDrawer(id);
        renderColumns();
        renderStats();
      });
    });

    // Add check
    const input = document.querySelector('.add-check input');
    const btn = document.querySelector('.add-check button');
    if (input && btn) {
      const add = () => {
        const t = input.value.trim(); if (!t) return;
        node.checks.push({ t, done: false });
        input.value = '';
        save();
        openDrawer(id);
        renderColumns();
        renderStats();
      };
      btn.addEventListener('click', add);
      input.addEventListener('keydown', e => { if (e.key === 'Enter') add(); });
    }

    // Wire child navigation
    document.querySelectorAll('[data-child]').forEach(el => {
      el.addEventListener('click', () => openDrawer(el.dataset.child));
    });

    // Wire seal
    const sealBtn = document.querySelector('[data-seal]');
    if (sealBtn) {
      sealBtn.addEventListener('click', () => {
        DATA.sealed.unshift({
          id: 's-' + Date.now(),
          title: node.title,
          project: project ? project.title : '',
          note: node.note || '',
          sealedNote: '',
        });
        node.status = 'sealed';
        save();
        closeDrawer();
        state.view = 'trophy';
        updateChipStates();
        renderStats();
        renderColumns();
      });
    }

    drawer.classList.add('open');
    backdrop.classList.add('open');
  }

  function closeDrawer() {
    drawer.classList.remove('open');
    backdrop.classList.remove('open');
    state.selectedId = null;
    document.querySelectorAll('.obs.selected').forEach(el => el.classList.remove('selected'));
  }
  document.getElementById('drawer-close').addEventListener('click', closeDrawer);
  backdrop.addEventListener('click', closeDrawer);
  window.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

  // ── Sleep prompt ──
  function maybeSleepPrompt() {
    const cands = [];
    DATA.projects.forEach(p => {
      allLeaves(p).forEach(l => {
        if (l.status === 'sleep' && !state.dismissedSleepPrompts.has(l.id)) {
          cands.push({ project: p, node: l });
        }
      });
    });
    if (!cands.length) return;
    const { project, node } = cands[0];

    // Cleanup any existing
    document.querySelectorAll('.sleep-prompt-backdrop').forEach(el => el.remove());

    const bd = document.createElement('div');
    bd.className = 'sleep-prompt-backdrop';
    bd.innerHTML = `
      <div class="sleep-prompt">
        <div class="sp-moon">SLEEP CHECK · 오래 잠들어 있는 항목</div>
        <div class="sp-title">아직 할 거예요?</div>
        <div class="sp-task">${esc(project.title)} / <strong>${esc(node.title)}</strong></div>
        <div class="sp-subtitle">솔직하게 정해주세요</div>
        <div class="sp-actions">
          <button class="sp-btn fire" data-sp="fire">◉ RELIGHT</button>
          <button class="sp-btn" data-sp="keep">→ KEEP SLEEPING</button>
          <button class="sp-btn kill" data-sp="kill">× DISCARD</button>
        </div>
      </div>
    `;
    document.body.appendChild(bd);
    bd.querySelectorAll('[data-sp]').forEach(btn => {
      btn.addEventListener('click', () => {
        const a = btn.dataset.sp;
        if (a === 'fire') node.status = 'fire';
        else if (a === 'kill') {
          // remove from parent
          (function remove(id, nodes = DATA.projects) {
            for (let i = 0; i < nodes.length; i++) {
              if (nodes[i].id === id) { nodes.splice(i, 1); return true; }
              if (nodes[i].children && remove(id, nodes[i].children)) return true;
            }
            return false;
          })(node.id);
        }
        state.dismissedSleepPrompts.add(node.id);
        bd.remove();
        save();
        renderStats();
        renderColumns();
      });
    });
  }

  // ── Init ──
  renderStats();
  renderFilters();
  renderColumns();
  setTimeout(maybeSleepPrompt, 800);

  window.questReset = () => { localStorage.removeItem(STORAGE_KEY); location.reload(); };
})();
</script>
</body>
</html>
