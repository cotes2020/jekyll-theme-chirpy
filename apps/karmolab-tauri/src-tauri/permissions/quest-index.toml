[[permission]]
identifier = "allow-quest-index"
description = "Allow the QuestLog widget to fetch the TASK tree snapshot (read-only: memo TASK files frontmatter + body checkboxes)."
commands.allow = [
  "get_quest_tree",
]

[[permission]]
identifier = "allow-quest-writeback"
description = "Allow the QuestLog widget to toggle a single checkbox or change the frontmatter status in a memo TASK file (write-back). Path whitelisted to {memo}/(wm|projects/karmolab|projects/yawnbot|life|hobby|learning)/tasks/TASK-*.md."
commands.allow = [
  "toggle_quest_check",
  "set_quest_status",
  "add_quest_check",
  "delete_quest_check",
]
