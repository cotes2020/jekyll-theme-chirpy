[[permission]]
identifier = "allow-localdev"
description = "Enables localdev repo-root and process helper commands for the KarmoLab desktop shell."
commands.allow = [
  "localdev_set_repo_root",
  "localdev_get_repo_root",
  "localdev_list_tracked",
  "localdev_list_external_pids",
  "localdev_stop_external",
  "localdev_start",
  "localdev_stop",
  "localdev_send_stdin",
  "localdev_follow_log",
  "localdev_stop_log_follow",
  "localdev_npm_install",
  "localdev_npm_install_stream",
  "localdev_deploy",
  "localdev_deploy_stream",
]
