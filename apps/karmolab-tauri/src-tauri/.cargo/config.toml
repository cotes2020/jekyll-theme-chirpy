# Windows ARM64: ring skips forcing "clang" on PATH when CC is already clang-like.
# Point CC at LLVM so build scripts find the compiler without relying on PATH.
# Only applies on Windows — CI runs on Linux where this path does not exist.
[target.'cfg(target_os = "windows")'.env]
CC = { value = "C:\\Program Files\\LLVM\\bin\\clang.exe", force = true }
