<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gems Master: Encryption Toolbox</title>
    <!-- CryptoJS: AES-256 / PBKDF2 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Pretendard:wght@400;600;800&display=swap');
        body { font-family: 'Pretendard', 'JetBrains Mono', sans-serif; background-color: #0d0f14; }
        .glass { background: rgba(21, 25, 33, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .neon-glow { box-shadow: 0 0 15px rgba(99, 102, 241, 0.3); }
        input, textarea { scrollbar-width: thin; scrollbar-color: #334155 transparent; }
    </style>
</head>
<body class="text-slate-300 min-h-screen p-4 md:p-8 flex items-center justify-center">

    <div class="max-w-4xl w-full space-y-6">
        <!-- Header -->
        <header class="flex items-center justify-between px-4">
            <div class="flex items-center gap-3">
                <div class="p-2 bg-indigo-600 rounded-lg neon-glow">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                    </svg>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold text-white tracking-tight">GEMS MASTER TOOLBOX</h1>
                    <p class="text-[10px] text-indigo-400 font-bold uppercase tracking-widest">Secret Management System</p>
                </div>
            </div>
            <div id="status-badge" class="hidden px-3 py-1 bg-green-500/10 border border-green-500/20 rounded-full text-green-400 text-xs font-bold animate-pulse">
                ACTION COMPLETED
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <!-- Left: Encrypt Section -->
            <section class="glass p-6 rounded-[2rem] shadow-2xl space-y-4">
                <div class="flex items-center gap-2 mb-2">
                    <span class="w-2 h-2 rounded-full bg-indigo-500"></span>
                    <h2 class="text-sm font-black text-white uppercase tracking-tighter">텍스트 암호화 (Encrypt)</h2>
                </div>
                <textarea id="plainInput" 
                    class="w-full h-40 bg-[#090a0d] border border-slate-800 rounded-2xl p-4 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-slate-300 placeholder:text-slate-600"
                    placeholder="암호화할 데이터를 입력하세요..."></textarea>
                
                <div>
                    <div class="flex justify-between items-center mb-2 ml-1">
                        <label class="block text-[10px] font-bold text-slate-500 uppercase">Security Level (Iterations)</label>
                        <span id="iterVal" class="text-[10px] font-mono font-bold text-indigo-400">10,000 번</span>
                    </div>
                    <input type="range" id="iterSlider" min="1000" max="100000" step="1000" value="10000" 
                        class="w-full accent-indigo-500 mb-4" oninput="document.getElementById('iterVal').innerText = Number(this.value).toLocaleString() + ' 번'">
                </div>

                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">Master Password</label>
                    <input type="password" id="encryptPass" 
                        class="w-full bg-[#090a0d] border border-slate-800 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-white"
                        placeholder="비밀번호 설정...">
                </div>

                <button id="btnEncrypt" onclick="startEncrypt()" 
                    class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-xl transition-all active:scale-95 shadow-lg shadow-indigo-600/10 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4" /></svg>
                    암호문 생성
                </button>
            </section>

            <!-- Right: Decrypt Section -->
            <section class="glass p-6 rounded-[2rem] shadow-2xl space-y-4 border-indigo-500/10 border">
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center gap-2">
                        <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
                        <h2 class="text-sm font-black text-white uppercase tracking-tighter">암호문 복호화 (Decrypt)</h2>
                    </div>
                    <button onclick="loadFromTxt()" class="text-[10px] bg-slate-800 hover:bg-emerald-600 px-3 py-1 rounded-full text-white font-bold transition-colors">
                        DATA 불러오기
                    </button>
                </div>
                <textarea id="cipherInput" 
                    class="w-full h-40 bg-[#090a0d] border border-slate-800 rounded-2xl p-4 text-sm font-mono focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-emerald-400/80 placeholder:text-slate-600"
                    placeholder="Base64 암호문을 입력하세요..."></textarea>
                
                <div>
                    <label class="block text-[10px] font-bold text-slate-500 uppercase mb-2 ml-1">Unlock Key</label>
                    <input type="password" id="decryptPass" 
                        class="w-full bg-[#090a0d] border border-slate-800 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-emerald-500 outline-none transition-all text-white"
                        placeholder="비밀번호 입력...">
                </div>

                <button id="btnDecrypt" onclick="startDecrypt()" 
                    class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-4 rounded-xl transition-all active:scale-95 shadow-lg shadow-emerald-600/10 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z" /></svg>
                    데이터 해독
                </button>
            </section>
        </div>

        <!-- Result Area (Floating) -->
        <div id="resultContainer" class="hidden glass p-8 rounded-[2.5rem] border border-indigo-500/20 animate-in fade-in zoom-in-95 duration-500 relative overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 id="resultTitle" class="text-xs font-black text-indigo-400 uppercase tracking-widest">OUTPUT RESULT</h3>
                <button onclick="copyResult()" class="text-[10px] bg-slate-800 hover:bg-indigo-600 px-3 py-1 rounded-full text-white font-bold transition-colors">COPY TO CLIPBOARD</button>
            </div>
            <pre id="resultArea" class="whitespace-pre-wrap break-all text-sm leading-relaxed text-slate-200 font-mono bg-black/30 p-6 rounded-3xl border border-white/5"></pre>
        </div>
    </div>

    <script>
        function showMessage(msg) {
            const badge = document.getElementById('status-badge');
            badge.innerText = msg;
            badge.classList.remove('hidden');
            setTimeout(() => badge.classList.add('hidden'), 3000);
        }

        function displayResult(title, content, timeTaken, isError = false) {
            const container = document.getElementById('resultContainer');
            const titleEl = document.getElementById('resultTitle');
            const areaEl = document.getElementById('resultArea');

            let timeText = timeTaken ? ` (${timeTaken.toFixed(2)}s)` : '';
            titleEl.innerText = title + timeText;
            titleEl.className = isError ? "text-xs font-black text-red-400 uppercase tracking-widest" : "text-xs font-black text-indigo-400 uppercase tracking-widest";
            areaEl.innerText = content;
            container.classList.remove('hidden');
            container.scrollIntoView({ behavior: 'smooth' });
        }

        function startEncrypt() {
            const btn = document.getElementById('btnEncrypt');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 🔒 암호화 진행 중...`;
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            setTimeout(() => {
                processEncrypt();
                btn.innerHTML = originalHtml;
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }, 50);
        }

        function startDecrypt() {
            const btn = document.getElementById('btnDecrypt');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = `<svg class="animate-spin h-5 w-5 mr-3 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> 🔓 복호화 진행 중...`;
            btn.disabled = true;
            btn.classList.add('opacity-75', 'cursor-not-allowed');

            setTimeout(() => {
                processDecrypt();
                btn.innerHTML = originalHtml;
                btn.disabled = false;
                btn.classList.remove('opacity-75', 'cursor-not-allowed');
            }, 50);
        }

        async function loadFromTxt() {
            try {
                const response = await fetch('/assets/js/mathjax-config.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error("데이터 파일 로드에 실패했습니다.");
                
                const text = await response.text();
                document.getElementById('cipherInput').value = text.trim();
                showMessage("LOAD COMPLETED");
            } catch (e) {
                alert(e.message);
            }
        }

        function processEncrypt() {
            const text = document.getElementById('plainInput').value;
            const pass = document.getElementById('encryptPass').value;
            const iterations = parseInt(document.getElementById('iterSlider').value);

            if (!text || !pass) {
                alert("내용과 비밀번호를 모두 입력해주세요.");
                return;
            }

            const startTime = performance.now();

            try {
                const salt = CryptoJS.lib.WordArray.random(16);
                const iv = CryptoJS.lib.WordArray.random(16);

                const key = CryptoJS.PBKDF2(pass, salt, {
                    keySize: 256 / 32,
                    iterations: iterations,
                    hasher: CryptoJS.algo.SHA256
                });

                const encrypted = CryptoJS.AES.encrypt(text, key, {
                    iv: iv,
                    mode: CryptoJS.mode.CBC,
                    padding: CryptoJS.pad.Pkcs7
                });

                const saltHex = salt.toString(CryptoJS.enc.Hex);
                const ivHex = iv.toString(CryptoJS.enc.Hex);
                const iterHex = iterations.toString(16).padStart(8, '0');
                const encryptedHex = encrypted.ciphertext.toString(CryptoJS.enc.Hex);
                
                const combinedHex = saltHex + ivHex + iterHex + encryptedHex;
                const finalBase64 = CryptoJS.enc.Hex.parse(combinedHex).toString(CryptoJS.enc.Base64);

                const endTime = performance.now();
                displayResult("ENCRYPTED DATA (SECURE)", finalBase64, (endTime - startTime) / 1000);
                showMessage("ENCRYPTION SUCCESS");
            } catch (e) {
                displayResult("ERROR", "암호화 실패: " + e.message, null, true);
            }
        }

        function processDecrypt() {
            const cipherBase64 = document.getElementById('cipherInput').value;
            const pass = document.getElementById('decryptPass').value;

            if (!cipherBase64 || !pass) {
                alert("암호문과 비밀번호를 모두 입력해주세요.");
                return;
            }

            const startTime = performance.now();

            try {
                const combinedHex = CryptoJS.enc.Base64.parse(cipherBase64).toString(CryptoJS.enc.Hex);
                
                if (combinedHex.length < 72) {
                    throw new Error("올바른 포맷의 암호문이 아닙니다.");
                }

                const saltHex = combinedHex.substring(0, 32);
                const ivHex = combinedHex.substring(32, 64);
                const iterHex = combinedHex.substring(64, 72);
                const encryptedHex = combinedHex.substring(72);

                const salt = CryptoJS.enc.Hex.parse(saltHex);
                const iv = CryptoJS.enc.Hex.parse(ivHex);
                const iterations = parseInt(iterHex, 16);
                const ciphertext = CryptoJS.enc.Hex.parse(encryptedHex);

                if (isNaN(iterations) || iterations <= 0) {
                    throw new Error("반복 횟수 정보를 파싱할 수 없습니다.");
                }

                const key = CryptoJS.PBKDF2(pass, salt, {
                    keySize: 256 / 32,
                    iterations: iterations,
                    hasher: CryptoJS.algo.SHA256
                });

                const cipherParams = CryptoJS.lib.CipherParams.create({ ciphertext: ciphertext });
                const decrypted = CryptoJS.AES.decrypt(cipherParams, key, {
                    iv: iv,
                    mode: CryptoJS.mode.CBC,
                    padding: CryptoJS.pad.Pkcs7
                });

                const result = decrypted.toString(CryptoJS.enc.Utf8);
                if (result) {
                    const endTime = performance.now();
                    displayResult(`DECRYPTED MESSAGE (ITERATIONS: ${iterations.toLocaleString()})`, result, (endTime - startTime) / 1000);
                    showMessage("DECRYPTION SUCCESS");
                } else {
                    throw new Error("비밀번호가 일치하지 않거나 데이터가 손상되었습니다.");
                }
            } catch (e) {
                displayResult("ERROR", "해독 실패: " + e.message, null, true);
            }
        }

        function copyResult() {
            const text = document.getElementById('resultArea').innerText;
            const textArea = document.createElement("textarea");
            textArea.value = text;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            showMessage("COPIED TO CLIPBOARD");
        }
    </script>
</body>
</html>
